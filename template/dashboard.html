<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання | To-Do List</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Сайдбар -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">📋 TodoApp</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/home?view=active" class="nav-btn">📝 Мої справи</a>
                <a href="/home?view=history" class="nav-btn">🕒 Історія</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">{{ user_nickname[0].upper() if user_nickname else "U" }}</div>
                    <div class="user-details">
                        <span class="user-name">{{ user_nickname }}</span>
                        <span class="user-email">{{ user_email }}</span>
                    </div>
                </div>
                <a href="/logout" class="logout-btn">🚪 Вийти</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="main-content">
            <header class="content-header">
                <h2>📝 Активні завдання</h2>
                <button class="add-task-btn" id="addTaskBtn">+ Додати справу</button>
            </header>

            <div class="tasks-container">
                {% for task in tasks %}
                <div class="task-item">
                    <!-- Чекбокс -->
                    <form action="/toggle-task/{{ task.id }}" method="post" class="task-form">
                        <button type="submit" class="checkbox-btn">
                            {% if task.completed %}✅{% else %}⬜{% endif %}
                        </button>
                    </form>
                    
                    <!-- Текст -->
                    <div class="task-content">
                        <span class="task-title">{{ task.title }}</span>
                        <span class="task-time">{{ task.created_at }}</span>
                    </div>
                    
                    <!-- 🔥 КНОПКА ВИДАЛИТИ 🔥 -->
                    <form action="/delete-task/{{ task.id }}" method="post" class="task-form">
                        <button type="submit" class="delete-btn">🗑️</button>
                    </form>
                </div>
                {% else %}
                <div class="empty-state">
                    <p>Немає завдань. Додай перше!</p>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <!-- Модальне вікно -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;">
        <div class="modal">
            <h3 class="modal-title">Нова задача</h3>
            <form action="/add-task" method="post" class="modal-form">
                <input 
                    type="text" 
                    name="title" 
                    placeholder="Що зробити?" 
                    class="modal-input"
                    required>
                <div class="modal-actions">
                    <button type="button" class="modal-cancel" onclick="document.getElementById('modalOverlay').style.display='none'">Скасувати</button>
                    <button type="submit" class="modal-save">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("addTaskBtn").onclick = () => {
            document.getElementById("modalOverlay").style.display = "flex";
        };
        
        // Перевірка чи є кнопки
        console.log("Кнопок видалити:", document.querySelectorAll('.delete-btn').length);
    </script>
</body>
</html>
